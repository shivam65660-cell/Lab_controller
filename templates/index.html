<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinel V1 | Ultimate Lab Controller</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar { background: #161b22; border-bottom: 1px solid #30363d; padding: 1rem; }
        .pc-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 15px; margin-bottom: 20px; transition: 0.2s; }
        .pc-card:hover { border-color: #58a6ff; box-shadow: 0 0 15px rgba(88, 166, 255, 0.1); }
        .status-dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .online { background-color: #238636; box-shadow: 0 0 5px #238636; }
        .firewall-warn { color: #f85149; font-size: 0.75rem; font-weight: bold; }
        .terminal { background: #010409; border: 1px solid #30363d; color: #39ff14; height: 450px; overflow-y: auto; padding: 15px; font-family: 'Consolas', monospace; font-size: 13px; border-radius: 6px; }
        .btn-action { font-size: 11px; text-transform: uppercase; font-weight: bold; padding: 5px; }
        .bw-meter { font-size: 12px; color: #58a6ff; font-family: monospace; }
        .ss-img { width: 100%; border-radius: 4px; margin-top: 10px; border: 1px solid #30363d; display: none; }
        .modal-content { border: 1px solid #30363d; }
    </style>
</head>
<body>

<nav class="navbar mb-4">
    <div class="container-fluid">
        <span class="navbar-brand text-white fw-bold">🛡️ SENTINEL ADVANCE V1</span>
        <div class="d-flex">
            <button class="btn btn-outline-danger btn-sm me-2" onclick="alert('Panic triggered for all PCs!')">🚨 PANIC ALL</button>
            <button class="btn btn-primary btn-sm" onclick="startScan()">⚡ RE-SCAN NETWORK</button>
        </div>
    </div>
</nav>

<div class="container-fluid px-4">
    <div class="row">
        <div class="col-lg-8">
            <div id="pc-container" class="row">
                <div class="col-12 text-center mt-5">
                    <p class="text-muted">No devices loaded. Click Re-Scan to begin.</p>
                </div>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="sticky-top" style="top: 20px;">
                <h6 class="text-uppercase small fw-bold mb-2">Live Console Output</h6>
                <div id="terminal" class="terminal shadow mb-3">READY TO MONITOR...</div>
                <img id="ss-display" class="ss-img shadow">
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="fileModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content bg-dark text-white border-secondary">
      <div class="modal-header border-secondary">
        <h5 class="modal-title">📂 File Explorer: <span id="current-path-display">C:\</span></h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" style="max-height: 500px; overflow-y: auto;">
        <table class="table table-dark table-hover">
          <thead class="sticky-top bg-dark">
            <tr><th>Name</th><th>Type</th><th>Date</th><th>Action</th></tr>
          </thead>
          <tbody id="file-list-body">
            </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
    async function startScan() {
        const container = document.getElementById('pc-container');
        container.innerHTML = '<div class="col-12 text-center mt-5"><div class="spinner-border text-primary" role="status"></div><p class="mt-2">Discovering Lab Devices...</p></div>';
        
        try {
            const res = await fetch('/scan');
            const devices = await res.json();
            container.innerHTML = '';

            if(devices.length === 0) {
                container.innerHTML = '<div class="alert alert-warning">No PCs found. Check your NETWORK_PREFIX in app.py</div>';
                return;
            }

            devices.forEach(pc => {
                container.innerHTML += `
                    <div class="col-md-6">
                        <div class="pc-card shadow-sm">
                            <div class="d-flex justify-content-between mb-2">
                                <div>
                                    <span class="status-dot online"></span>
                                    <strong class="text-white">${pc.name}</strong>
                                    <div class="small text-muted">${pc.ip}</div>
                                </div>
                                <div class="text-end">
                                    <div id="bw-${pc.ip}" class="bw-meter">BW: -- KB/s</div>
                                    ${pc.firewall_on ? '<span class="firewall-warn">⚠️ FIREWALL ON</span>' : '<span class="text-success small">✔ OPEN</span>'}
                                </div>
                            </div>

                            <div class="row g-1 mb-2">
                                <div class="col-7"><input type="text" id="msg-${pc.ip}" class="form-control form-control-sm bg-dark text-white border-secondary" placeholder="Message..."></div>
                                <div class="col-5"><button class="btn btn-primary btn-sm w-100 btn-action" onclick="fireAction('${pc.ip}', 'msg')">Send Msg</button></div>
                            </div>

                            <div class="row g-1 mb-3">
                                <div class="col-7"><input type="text" id="kill-${pc.ip}" class="form-control form-control-sm bg-dark text-white border-secondary" placeholder="Process Name..."></div>
                                <div class="col-5"><button class="btn btn-danger btn-sm w-100 btn-action" onclick="fireAction('${pc.ip}', 'kill_proc')">Kill Task</button></div>
                            </div>

                            <div class="d-flex flex-wrap gap-1 border-top border-secondary pt-2">
                                <button class="btn btn-outline-info btn-action" onclick="fireAction('${pc.ip}', 'screenshot')">SS</button>
                                <button class="btn btn-outline-success btn-action" onclick="fireAction('${pc.ip}', 'get_bandwidth')">Bandwidth</button>
                                <button class="btn btn-outline-primary btn-action" onclick="fireAction('${pc.ip}', 'rdp_enable')">RDP</button>
                                <button class="btn btn-outline-warning btn-action" onclick="fireAction('${pc.ip}', 'get_tasks')">Tasks</button>
                                <button class="btn btn-outline-light btn-action" onclick="fireAction('${pc.ip}', 'fix')">Fix RPC</button>
                                <button class="btn btn-info btn-action" onclick="openExplorer('${pc.ip}')">📁 Files</button>
                                <button class="btn btn-warning btn-action" onclick="fireAction('${pc.ip}', 'full_auto_fix')">⚙️ AUTO</button>
                                <button class="btn btn-danger btn-action" onclick="fireAction('${pc.ip}', 'restart')">Reboot</button>
                            </div>
                        </div>
                    </div>`;
            });
        } catch(e) { container.innerHTML = '<div class="alert alert-danger">Scan Failed. Check Backend Connection.</div>'; }
    }

    async function fireAction(ip, action) {
        const terminal = document.getElementById('terminal');
        const msg = document.getElementById(`msg-${ip}`)?.value;
        const proc = document.getElementById(`kill-${ip}`)?.value;
        
        terminal.innerHTML += `<div class="text-info mt-1">>> Command: ${action} to ${ip}...</div>`;
        
        try {
            const res = await fetch('/action', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ ip, action, message: msg, cmd: proc })
            });
            const data = await res.json();

            if(data.status === "need_password") {
                const pass = prompt(`Enter Administrator Password for ${ip}:`);
                if(pass) sendWithPass(ip, action, pass, msg, proc);
            } else if(action === 'get_bandwidth') {
                document.getElementById(`bw-${ip}`).innerText = "BW: " + data.output;
            } else if(data.img) {
                const img = document.getElementById('ss-display');
                img.src = data.img; img.style.display = 'block';
            }
            
            if(data.output) terminal.innerHTML += `<pre class="text-white">${data.output}</pre>`;
            terminal.scrollTop = terminal.scrollHeight;
        } catch(e) { terminal.innerHTML += `<div class="text-danger">Error executing command!</div>`; }
    }

    async function sendWithPass(ip, action, password, message, cmd) {
        const res = await fetch('/action', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ ip, action, password, message, cmd })
        });
        const data = await res.json();
        alert("Credential Saved & Action Performed!");
        startScan();
    }

    // --- File Explorer Logic ---

    async function openExplorer(ip, path = 'C:\\') {
        const tbody = document.getElementById('file-list-body');
        tbody.innerHTML = '<tr><td colspan="4" class="text-center">Loading files...</td></tr>';
        
        // Show Modal
        var myModal = new bootstrap.Modal(document.getElementById('fileModal'));
        myModal.show();

        try {
            const res = await fetch('/list_files', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ ip, path })
            });
            const data = await res.json();

            if(data.status === "Success") {
                document.getElementById('current-path-display').innerText = data.current_path;
                tbody.innerHTML = '';
                
                // Back Button (If not in root)
                if (path !== 'C:\\') {
                    const parentPath = path.substring(0, path.lastIndexOf('\\', path.length - 2)) + '\\';
                    tbody.innerHTML += `<tr><td colspan="4" style="cursor:pointer;" class="text-info" onclick="openExplorer('${ip}', '${parentPath}')">↩ .. (Parent Directory)</td></tr>`;
                }

                data.files.forEach(file => {
                    const icon = file.is_dir ? "📁" : "📄";
                    const safePath = (data.current_path + file.name + (file.is_dir ? '\\' : '')).replace(/\\/g, '\\\\');
                    
                    const actionBtn = file.is_dir 
                        ? `<button class="btn btn-sm btn-primary" onclick="openExplorer('${ip}', '${safePath}')">Open</button>`
                        : `<button class="btn btn-sm btn-success" onclick="downloadFile('${ip}', '${safePath}')">Download</button>`;
                    
                    tbody.innerHTML += `
                        <tr>
                            <td>${icon} ${file.name}</td>
                            <td>${file.is_dir ? 'Folder' : 'File'}</td>
                            <td>${file.date}</td>
                            <td>${actionBtn}</td>
                        </tr>`;
                });
            } else if (data.status === "need_password") {
                alert("Please authenticate this PC first using any other action (like Tasks).");
            }
        } catch(e) { alert("Error loading files"); }
    }

    async function downloadFile(ip, path) {
        const terminal = document.getElementById('terminal');
        terminal.innerHTML += `<div class="text-warning">>> Starting Download: ${path}...</div>`;

        try {
            const res = await fetch('/download_file', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ ip, path })
            });
            const data = await res.json();

            if (data.status === "Success") {
                terminal.innerHTML += `<div class="text-success">>> File ready! Downloading...</div>`;
                const a = document.createElement('a');
                a.href = data.download_url;
                a.download = path.split('\\').pop();
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            } else {
                alert("Download Failed: " + data.output);
            }
        } catch (e) {
            terminal.innerHTML += `<div class="text-danger">>> Download Error!</div>`;
        }
    }
</script>
</body>
</html>
